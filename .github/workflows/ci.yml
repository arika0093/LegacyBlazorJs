name: Build and publish latest ASP.NET Core tags to NuGet

on:
  workflow_dispatch:
    inputs:
      majors:
        description: Space- or comma-separated .NET majors to build and test
        type: string
        default: '8 9 10'
      run_compat:
        description: Run compatibility tests for the selected majors
        type: boolean
        default: true
      publish_github:
        description: Create GitHub releases
        type: boolean
        default: false
      publish_nuget:
        description: Publish packages to NuGet.org
        type: boolean
        default: false
  schedule:
    - cron: '23 5 * * 1'

permissions:
  contents: write

jobs:
  # build the latest ASP.NET Core source, create browser variants and NuGet package, and upload artifacts for release
  build:
    runs-on: ubuntu-latest
    steps:
      # setup environment
      # > source
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # > node (20)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      # > dotnet (all supported majors + test framework target)
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      # fetch upstream source, build browser variants, and pack NuGet
      - name: Build upstream source, browser variants, and NuGet package
        run: npm run build -- 8 9 10
        env:
          GITHUB_TOKEN: "${{ github.token }}"

      # upload artifacts
      # > build output (js files)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-build-output
          path: dist/**/*.js
      # > packages (nupkg + build summary)
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/build-summary.json

  # Run ES20x compatibility matrix tests with specific Chromium versions
  test-compat:
    needs: [build]
    if: inputs.run_compat
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: [8, 9, 10]
    steps:
      # > source
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # > node (20)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      # > dotnet (test framework target + package target frameworks)
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ matrix.dotnet }}.0.x
      # download artifacts from build job
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages
      # > npm dependencies
      - run: npm ci --ignore-scripts
      # > playwright dependencies; the compatibility harness downloads each profile's old Chromium
      - run: dotnet tool install --global Microsoft.Playwright.CLI
      - run: playwright install-deps chromium -p tests/PlaywrightTest/PlaywrightTest.csproj
      # execute compatibility test matrix for this .NET version
      - name: Run ES20x compatibility matrix (.NET ${{ matrix.dotnet }})
        run: npm run test:compat
        env:
          DOTNET_MAJOR: ${{ matrix.dotnet }}

  # If a new version is found, create a release and publish to NuGet/GitHub
  release-github:
    needs: [build, test-compat]
    if: inputs.publish_github
    runs-on: ubuntu-latest
    steps:
      # download artifacts from build job
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages

      # create a GitHub release per package version (skip already-released versions)
      - name: Create GitHub releases
        run: |
          for nupkg in artifacts/packages/*.nupkg; do
            VERSION="$(basename "$nupkg" | sed -E 's/^LegacyBlazorJs\.(.+)\.nupkg$/\1/')"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$(basename "$nupkg")" ]; then
              echo "::warning::Could not parse version from $(basename "$nupkg"), skipping."
              continue
            fi
            if gh release view "$VERSION" >/dev/null 2>&1; then
              echo "Version $VERSION is already released. Skipping."
            else
              echo "Creating release for $VERSION"
              gh release create "$VERSION" "$nupkg" \
                --title "LegacyBlazorJs $VERSION" \
                --notes "Automated release of LegacyBlazorJs $VERSION built from the latest ASP.NET Core source."
            fi
          done
        env:
          GITHUB_TOKEN: "${{ github.token }}"

  release-nuget:
    needs: [build, test-compat]
    if: inputs.publish_nuget
    runs-on: ubuntu-latest
    steps:
      # download artifacts from build job
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages
      
      - name: NuGet login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: arika0093

      - name: Publish NuGet Package
        run: dotnet nuget push ./artifacts/packages/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }}