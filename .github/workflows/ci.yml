name: Build and publish latest ASP.NET Core tags to NuGet

on:
  workflow_dispatch:
    inputs:
      majors:
        description: Space- or comma-separated .NET majors to build and test
        type: string
        default: '8 9 10'
      run_compat:
        description: Run compatibility tests for the selected majors
        type: boolean
        default: true
      publish_github:
        description: Create GitHub releases
        type: boolean
        default: false
      publish_nuget:
        description: Publish packages to NuGet.org
        type: boolean
        default: false
  schedule:
    - cron: '23 5 * * 1'

permissions:
  contents: write

jobs:
  # Validate manual inputs and expose one normalized major list to all following jobs.
  configure:
    runs-on: ubuntu-latest
    outputs:
      majors: ${{ steps.majors.outputs.args }}
      matrix: ${{ steps.majors.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - id: majors
        name: Resolve selected .NET majors
        env:
          REQUESTED_MAJORS: ${{ github.event_name == 'workflow_dispatch' && inputs.majors || '' }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const supported = JSON.parse(fs.readFileSync('config/majors.json', 'utf8')).supportedMajors;
          const requested = process.env.REQUESTED_MAJORS.trim()
            ? process.env.REQUESTED_MAJORS.split(/[\s,]+/).filter(Boolean).map(Number)
            : supported;
          const majors = [...new Set(requested)];
          const invalid = majors.filter(major => !supported.includes(major));
          if (majors.length === 0 || invalid.length > 0 || majors.some(Number.isNaN)) {
            throw new Error(`Select one or more supported majors (${supported.join(', ')}). Invalid values: ${invalid.join(', ')}`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `args=${majors.join(' ')}\nmatrix=${JSON.stringify(majors)}\n`);
          NODE

  # build the latest ASP.NET Core source, create browser variants and NuGet package, and upload artifacts for release
  build:
    needs: configure
    runs-on: ubuntu-latest
    steps:
      # setup environment
      # > source
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # > node (20)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      # > dotnet (all supported majors + test framework target)
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      # fetch upstream source, build browser variants, and pack NuGet
      - name: Build upstream source, browser variants, and NuGet package
        run: npm run build -- ${{ needs.configure.outputs.majors }}
        env:
          GITHUB_TOKEN: "${{ github.token }}"

      # upload artifacts
      # > build output (js files)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: LegacyBlazorJs-build-output
          path: dist/**/*.js
      # > packages (nupkg + build summary)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: LegacyBlazorJs-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/build-summary.json

  # Run ES20x compatibility matrix tests with specific Chromium versions
  test-compat:
    needs: [configure, build]
    if: inputs.run_compat
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ${{ fromJSON(needs.configure.outputs.matrix) }}
    steps:
      # > source
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # > node (20)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      # > dotnet (test framework target + package target frameworks)
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      # download artifacts from build job
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages
      # > npm dependencies
      - run: npm ci --ignore-scripts
      # > playwright dependencies; the compatibility harness downloads each profile's old Chromium
      - run: dotnet tool install --global Microsoft.Playwright.CLI
      - run: playwright install-deps chromium
      # execute compatibility test matrix for this .NET version
      - name: Run ES20x compatibility matrix (.NET ${{ matrix.dotnet }})
        run: npm run test:compat
        env:
          DOTNET_MAJOR: ${{ matrix.dotnet }}

  # If a new version is found, create a release and publish to NuGet/GitHub
  release-github:
    needs: [build, test-compat]
    if: inputs.publish_github
    runs-on: ubuntu-latest
    steps:
      # download artifacts from build job
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages

      # create a GitHub release per package version (skip already-released versions)
      - name: Create GitHub releases
        run: |
          for nupkg in artifacts/packages/*.nupkg; do
            VERSION="$(basename "$nupkg" | sed -E 's/^LegacyBlazorJs\.(.+)\.nupkg$/\1/')"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$(basename "$nupkg")" ]; then
              echo "::warning::Could not parse version from $(basename "$nupkg"), skipping."
              continue
            fi
            if gh release view "$VERSION" >/dev/null 2>&1; then
              echo "Version $VERSION is already released. Skipping."
            else
              echo "Creating release for $VERSION"
              gh release create "$VERSION" "$nupkg" \
                --title "LegacyBlazorJs $VERSION" \
                --notes "Automated release of LegacyBlazorJs $VERSION built from the latest ASP.NET Core source."
            fi
          done
        env:
          GITHUB_TOKEN: "${{ github.token }}"

  release-nuget:
    needs: [build, test-compat]
    if: inputs.publish_nuget
    runs-on: ubuntu-latest
    steps:
      # download artifacts from build job
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages
      
      - name: NuGet login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: arika0093

      - name: Publish NuGet Package
        run: dotnet nuget push ./artifacts/packages/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }}