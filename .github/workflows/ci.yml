name: Build and publish latest ASP.NET Core tags to NuGet

on:
  workflow_dispatch:
    inputs:
      run_compat:
        description: Run compatibility tests for the latest LTS and preview packages
        type: boolean
        default: true
      publish_github:
        description: Create GitHub releases
        type: boolean
        default: false
      publish_nuget:
        description: Publish packages to NuGet.org
        type: boolean
        default: false
  schedule:
    - cron: '23 7 * * 1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      lts-package-version: ${{ steps.lts-version.outputs.version }}
      lts-package-major: ${{ steps.lts-version.outputs.major }}
      preview-package-version: ${{ steps.preview-version.outputs.version }}
      preview-package-major: ${{ steps.preview-version.outputs.major }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: latest
          # The LTS build can also be built with the preview SDK, so we use the preview SDK fixedly.
          dotnet-quality: preview

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Resolve latest LTS package version
        id: lts-version
        run: node scripts/build/resolve-version.mjs
        env:
          BUILD_CHANNEL: lts
          GITHUB_TOKEN: ${{ github.token }}

      - name: Resolve latest preview package version
        id: preview-version
        run: node scripts/build/resolve-version.mjs
        env:
          BUILD_CHANNEL: preview
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build upstream source, browser variants, and NuGet package
        run: npm run build
        env:
          BUILD_CHANNELS: 'lts,preview'
          GITHUB_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-build-output
          path: dist/**/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/build-summary.json

  test-compat:
    needs: [build]
    if: github.event_name == 'workflow_dispatch' && inputs.run_compat
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [es2015, es2017, es2018, es2020]
        hosting: [Server]
        channel: [lts, preview]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: latest
          dotnet-quality: preview 
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages
      - run: npm ci --ignore-scripts
      - name: Select old Chromium for smoke test
        run: node scripts/test/export-browser-env.mjs ${{ matrix.profile }}
      - name: Run smoke test (${{ matrix.channel }}, ${{ matrix.profile }}, Blazor ${{ matrix.hosting }})
        run: node --test tests/PlaywrightTest/smoke.test.mjs
        env:
          PACKAGE_VERSION: ${{ matrix.channel == 'lts' && needs.build.outputs.lts-package-version || needs.build.outputs.preview-package-version }}
          SMOKE_TEST_PROFILE: ${{ matrix.profile }}
          SMOKE_TEST_HOSTING_MODEL: ${{ matrix.hosting }}

  release-github:
    needs: [build, test-compat]
    if: inputs.publish_github && (needs.test-compat.result == 'success' || needs.test-compat.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-build-output
          path: .

      - name: Prepare JS release archives
        run: node scripts/build/export-release-assets.mjs

      - name: Create GitHub releases
        run: |
          shopt -s nullglob
          for nupkg in artifacts/packages/*.nupkg; do
            VERSION="$(basename "$nupkg" | sed -E 's/^LegacyBlazorJs\.(.+)\.nupkg$/\1/')"
            JS_ZIP="artifacts/releases/LegacyBlazorJs.${VERSION}.zip"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$(basename "$nupkg")" ]; then
              echo "::warning::Could not parse version from $(basename "$nupkg"), skipping."
              continue
            fi
            if [ ! -f "$JS_ZIP" ]; then
              echo "::error::Missing JS archive for $VERSION: $JS_ZIP"
              exit 1
            fi
            RELEASE_ARGS=()
            if [[ "$VERSION" == *-* ]]; then
              RELEASE_ARGS+=(--prerelease)
            fi
            if gh release view "$VERSION" >/dev/null 2>&1; then
              echo "Version $VERSION is already released. Uploading assets."
            else
              echo "Creating release for $VERSION"
              gh release create "$VERSION" \
                --title "LegacyBlazorJs $VERSION" \
                --notes "Automated release of LegacyBlazorJs $VERSION built from the latest ASP.NET Core source." \
                "${RELEASE_ARGS[@]}"
            fi
            gh release upload "$VERSION" "$nupkg" "$JS_ZIP" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ github.token }}

  release-nuget:
    needs: [build, test-compat]
    if: inputs.publish_nuget && (needs.test-compat.result == 'success' || needs.test-compat.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages

      - name: NuGet login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: arika0093

      - name: Publish NuGet package
        run: dotnet nuget push ./artifacts/packages/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
