name: Build and publish latest ASP.NET Core tags to NuGet

on:
  workflow_dispatch:
    inputs:
      run_compat:
        description: Run compatibility tests 
        type: boolean
        default: true
      publish_github:
        description: Create GitHub releases
        type: boolean
        default: true
      publish_nuget:
        description: Publish packages to NuGet.org
        type: boolean
        default: true
  schedule:
    # The .NET patch releases are released on the second Tuesday of every month,
    # and at that time, Preview releases are also published.
    # but we cannot specify that directly,
    # so we run it every Wednesday and make that determination inside the workflow.
    # see: https://dotnet.microsoft.com/en-us/platform/support/policy
    - cron: '23 4 * * 3' # every Wednesday at 04:23 UTC

permissions:
  contents: write

jobs:
  # If this is a scheduled run, check if it is running on the day
  # after the second Tuesday of the month, and skip if not.
  # If this is not a scheduled run, always run.
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check if scheduled run is on the next day after the second Tuesday of the month
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # Get the current date in UTC
            CURRENT_DATE=$(date -u +%Y-%m-%d)
            # Get the second Tuesday of the current month in UTC
            SECOND_TUESDAY=$(date -u -d "$(date -u +%Y-%m-01) +1 month" +%Y-%m-01)
            SECOND_TUESDAY=$(date -u -d "$SECOND_TUESDAY +$(( (8 - $(date -u -d "$SECOND_TUESDAY" +%u) + 2) % 7 )) days" +%Y-%m-%d)
            # Get the next day after the second Tuesday
            NEXT_DAY_AFTER_SECOND_TUESDAY=$(date -u -d "$SECOND_TUESDAY +1 day" +%Y-%m-%d)
            if [[ "$CURRENT_DATE" != "$NEXT_DAY_AFTER_SECOND_TUESDAY" ]]; then
              echo "This scheduled run is not on the next day after the second Tuesday of the month. Skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

  resolve-builds:
    runs-on: ubuntu-latest
    if: ${{ needs.check-schedule.outputs.skip != 'true' }}
    outputs:
      builds: ${{ steps.builds.outputs.builds }}
      target-profiles: ${{ steps.builds.outputs.target-profiles }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      # Resolve the repository commit height
      # excluding Markdown files, for appending to the upstream version.
      - name: Resolve repository commit height
        id: repository-version
        run: |
          HEIGHT=$(git rev-list --count HEAD -- src/ dotnet/src/ config/ package.json ':(exclude,glob)**/*.md')
          echo "height=${HEIGHT}" >> "$GITHUB_OUTPUT"
      
      - name: Resolve configured package lines
        id: builds
        run: node src/build/resolve-builds.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY_COMMIT_HEIGHT: ${{ steps.repository-version.outputs.height }}

  # Build and upload for each configured package line and each profile
  build-all:
    needs: [resolve-builds]
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.resolve-builds.outputs.builds) }}
        profile: ${{ fromJson(needs.resolve-builds.outputs.target-profiles) }}
    uses: ./.github/workflows/ci-profile-build.yml
    with:
      channel: ${{ matrix.build.channel }}
      profile: ${{ matrix.profile }}
      package-version: ${{ matrix.build.version }}
      upstream-tag: ${{ matrix.build.tag }}
      upstream-ref: ${{ matrix.build.tag }}
      dotnet-major: ${{ matrix.build.major }}

  test-compat:
    needs: [resolve-builds, build-all]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_compat }}
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.resolve-builds.outputs.builds) }}
        profile: [es5, es2015, es2020]
    uses: ./.github/workflows/ci-profile-test.yml
    with:
      channel: ${{ matrix.build.channel }}
      profile: ${{ matrix.profile }}
      package-version: ${{ matrix.build.version }}

  package-all:
    needs: [resolve-builds, build-all, test-compat]
    if: ${{ always() && needs.build-all.result == 'success' && (needs.test-compat.result == 'success' || needs.test-compat.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.resolve-builds.outputs.builds) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: latest
          dotnet-quality: preview
      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: LegacyBlazorJs-build-${{ matrix.build.channel }}-*
          path: .work/ci/${{ matrix.build.channel }}

      - name: Assemble profile artifacts (${{ matrix.build.channel }})
        run: node src/build/assemble-profile-builds.mjs .work/ci/${{ matrix.build.channel }}

      - name: Pack final package (${{ matrix.build.channel }})
        run: node src/build/package-from-build-summary.mjs

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-release-${{ matrix.build.channel }}
          path: |
            dist/**/*
            artifacts/packages/*.nupkg
            artifacts/packages/build-summary.json

  assemble-release-artifacts:
    needs: [package-all]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: LegacyBlazorJs-release-*
          path: .work/release

      - name: Merge release artifacts
        run: |
          rm -rf dist artifacts/packages
          mkdir -p dist artifacts/packages
          while IFS= read -r dist_dir; do
            cp -a "$dist_dir"/. dist/
          done < <(find .work/release -type d -path '*/dist' | sort)
          while IFS= read -r nupkg; do
            cp -a "$nupkg" artifacts/packages/
          done < <(find .work/release -type f -path '*/artifacts/packages/*.nupkg' | sort)
          mapfile -t summaries < <(find .work/release -type f -path '*/artifacts/packages/build-summary.json' | sort)
          node src/build/merge-build-summaries.mjs "${summaries[@]}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-release-bundle
          path: |
            dist/**/*
            artifacts/packages/*.nupkg
            artifacts/packages/build-summary.json

  release-github:
    needs: [assemble-release-artifacts]
    if: ${{ github.event_name == 'schedule' || inputs.publish_github }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-release-bundle
          path: .

      - name: Prepare JS release archives
        run: node src/build/export-release-assets.mjs

      - name: Create GitHub releases
        run: |
          shopt -s nullglob
          mapfile -t nupkgs < <(find artifacts/packages -maxdepth 1 -type f -name 'LegacyBlazorJs.*.nupkg' | sort -V)
          for nupkg in "${nupkgs[@]}"; do
            VERSION="$(basename "$nupkg" | sed -E 's/^LegacyBlazorJs\.(.+)\.nupkg$/\1/')"
            JS_ZIP="artifacts/releases/LegacyBlazorJs.${VERSION}.zip"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$(basename "$nupkg")" ]; then
              echo "::warning::Could not parse version from $(basename "$nupkg"), skipping."
              continue
            fi
            if [ ! -f "$JS_ZIP" ]; then
              echo "::error::Missing JS archive for $VERSION: $JS_ZIP"
              exit 1
            fi
            RELEASE_ARGS=()
            if [[ "$VERSION" == *-* ]]; then
              RELEASE_ARGS+=(--prerelease)
            fi
            if gh release view "$VERSION" >/dev/null 2>&1; then
              echo "Version $VERSION is already released. Uploading assets."
            else
              echo "Creating release for $VERSION"
              gh release create "$VERSION" \
                --title "v$VERSION" \
                --notes "Automated release of LegacyBlazorJs $VERSION built from the latest ASP.NET Core source." \
                "${RELEASE_ARGS[@]}"
            fi
            gh release upload "$VERSION" "$nupkg" "$JS_ZIP" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ github.token }}
          
  release-nuget:
    needs: [assemble-release-artifacts]
    if: ${{ github.event_name == 'schedule' || inputs.publish_nuget }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: latest
          dotnet-quality: preview

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-release-bundle
          path: .

      - name: NuGet login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: arika0093

      - name: Publish NuGet package
        run: >
          dotnet nuget push ./artifacts/packages/*.nupkg --skip-duplicate
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}

  commit-github:
    needs: [assemble-release-artifacts]
    if: ${{ github.event_name == 'schedule' || inputs.publish_github }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: release
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-release-bundle
          path: .incoming
      - name: Copy release bundle artifacts into dist
        run: |
          set -euo pipefail
          mv -f .incoming/dist dist/
      - name: Commit and push release branch updates
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "release: update artifacts"
          file_pattern: "dist/**"

  # Update the README build status table with the latest monthly run results.
  update-readme:
    needs: [assemble-release-artifacts]
    if: ${{ always() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      - name: Update README build status
        run: node util/update-readme-status.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Commit and push README changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update build status tables [monthly]"
          file_pattern: "README.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
