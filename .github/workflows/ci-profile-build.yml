name: CI profile build

on:
  workflow_call:
    inputs:
      # The build channel to test against, e.g. "current" or "preview"
      channel:
        required: true
        type: string
      # The profile to build, e.g. "es5" or "es2015"
      profile:
        required: false
        type: string
        default: ''
      # The profiles to build as a comma-separated list. Leave empty to use "profile",
      # or to build every target profile defined in config/targets.json when "profile" is also empty.
      build-profiles:
        required: false
        type: string
        default: ''
      # Optional suffix for the uploaded build artifact name.
      artifact-suffix:
        required: false
        type: string
        default: ''
      # The package version to build against, e.g. "7.0.0-preview.5"
      package-version:
        required: true
        type: string
      # Optional upstream ref to build from, e.g. "main". When set, build against this ref
      # while still using "package-version" for NuGet package metadata and target framework resolution.
      upstream-ref:
        required: false
        type: string
        default: ''
      # Whether to disable Terser (used for minifying JavaScript)
      disable-terser:
        required: false
        type: boolean
        default: false
      # The logging level to bake into the built scripts, e.g. "Trace" or "Information"
      signalr-logging:
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
          cache: npm
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: latest
          # The LTS build can also be built with the preview SDK, so we use the preview SDK fixedly.
          dotnet-quality: preview

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Build upstream source and partial package (${{ inputs.channel }}, ${{ inputs.profile }})
        run: npm run build
        env:
          BUILD_CHANNEL: ${{ inputs.channel }}
          BUILD_TARGET_PROFILES: ${{ inputs.build-profiles != '' && inputs.build-profiles || inputs.profile }}
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ inputs.package-version }}
          UPSTREAM_REF: ${{ inputs.upstream-ref }}
          LEGACY_BLAZOR_DISABLE_TERSER: ${{ inputs.disable-terser && 'true' || '' }}
          SIGNALR_LOGGING: ${{ inputs.signalr-logging }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-build-${{ inputs.channel }}-${{ inputs.artifact-suffix != '' && inputs.artifact-suffix || inputs.profile }}
          path: |
            dist/**/*
            artifacts/packages/*.nupkg
            artifacts/packages/build-summary.json
