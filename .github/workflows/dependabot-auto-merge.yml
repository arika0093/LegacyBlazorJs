
name: Auto-merge or close Dependabot npm updates

on:
  workflow_run:
    workflows:
      - Smoke test generated scripts
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  # Resolve the pull request number for the Dependabot workflow run.
  resolve-pr:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.resolve-pr.outputs.number }}
    steps:
      - name: Resolve pull request number
        id: resolve-pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number')"
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "No open pull request was found for workflow run branch: $HEAD_BRANCH"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

  # Enable auto-merge for successful Dependabot PRs.
  enable-auto-merge:
    needs: [resolve-pr]
    if: >-
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge for the Dependabot pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.number }}
        run: |
          # Prefer --auto so the PR waits for any remaining required checks or
          # reviews before merging. When the smoke-test has already passed and
          # the PR is directly mergeable (mergeStateStatus CLEAN), GitHub rejects
          # the enablePullRequestAutoMerge mutation with "Branch does not have
          # required protected branch rules"; in that case squash-merge now so
          # the PR is not left fully-green-but-unprocessed. Other --auto failures
          # (e.g. unsatisfied reviews) are surfaced so the job keeps failing.
          err="$(gh pr merge --repo "$GITHUB_REPOSITORY" --auto --squash "$PR_NUMBER" 2>&1 >/dev/null)" || true
          if [ -z "$err" ]; then
            echo "Auto-merge enabled for PR #$PR_NUMBER."
            exit 0
          fi
          echo "$err" >&2
          case "$err" in
            *"Branch does not have required protected branch rules"*)
              echo "PR is already mergeable; performing direct squash merge." >&2
              gh pr merge --repo "$GITHUB_REPOSITORY" --squash "$PR_NUMBER"
              ;;
            *)
              exit 1
              ;;
          esac

  # Close failed Dependabot PRs so broken update branches do not stay open indefinitely.
  close-failed-pr:
    needs: [resolve-pr]
    if: >-
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Close failed pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.number }}
        run: |
          gh pr close --repo "$GITHUB_REPOSITORY" "$PR_NUMBER" --comment "Closing this Dependabot PR automatically because the smoke-test workflow failed."
