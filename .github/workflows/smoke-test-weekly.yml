name: Weekly smoke test upstream (preview target)

on:
  schedule:
    - cron: '53 5 * * 1' # Run at 5:53 AM UTC every Monday

permissions:
  contents: read

jobs:
  resolve-build-preview:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.preview-version.outputs.version }}
    steps:
      # setup environment
      # > source
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # > node (latest)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      # Resolve a package version/TFM pair compatible with the preview SDK
      - name: Resolve latest preview package version
        id: preview-version
        run: node scripts/build/resolve-version.mjs
        env:
          BUILD_CHANNEL: preview
          GITHUB_TOKEN: ${{ github.token }}

  # Run smoke tests against the upstream-main package to detect layout/build regressions early
  smoke-test:
    needs: [resolve-build-preview]
    strategy:
      fail-fast: false
      matrix:
        profile: [es5, es2015]
    uses: ./.github/workflows/ci-profile-build.yml
    with:
      channel: preview
      profile: ${{ matrix.profile }}
      package-version: ${{ needs.resolve-build-preview.outputs.package-version }}
      run-compat: true
      disable-terser: true
      signalr-logging: Trace
