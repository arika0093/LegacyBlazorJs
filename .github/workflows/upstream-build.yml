name: Daily build and testing

on:
  schedule:
    - cron: '0 21 * * *' # Run at 21:00 UTC everyday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-build-metadata:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.preview-version.outputs.version }}
    steps:
      # setup environment
      # > source
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # > node (latest)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      # Resolve the latest preview package version so restore/pack still uses a valid NuGet version
      # while the upstream source itself is built from main.
      - name: Resolve latest preview package version
        id: preview-version
        run: node scripts/build/resolve-version.mjs
        env:
          BUILD_CHANNEL: preview
          GITHUB_TOKEN: ${{ github.token }}

  # Build the upstream-main package variants to detect layout/build regressions early
  build:
    needs: [resolve-build-metadata]
    strategy:
      fail-fast: false
      matrix:
        profile: [es5, es2015]
    uses: ./.github/workflows/ci-profile-build.yml
    with:
      channel: preview
      profile: ${{ matrix.profile }}
      package-version: ${{ needs.resolve-build-metadata.outputs.package-version }}
      upstream-ref: main
      disable-terser: true
      signalr-logging: Trace

  # Run smoke tests against the built main package using the latest preview NuGet line
  smoke-test:
    needs: [resolve-build-metadata, build]
    strategy:
      fail-fast: false
      matrix:
        profile: [es5, es2015]
    uses: ./.github/workflows/ci-profile-test.yml
    with:
      channel: preview
      profile: ${{ matrix.profile }}
      package-version: ${{ needs.resolve-build-metadata.outputs.package-version }}
