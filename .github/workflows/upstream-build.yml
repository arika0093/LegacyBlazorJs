name: Daily build and testing

on:
  schedule:
    # Run at 19:46 UTC (04:46 JST) everyday.
    - cron: '46 19 * * *'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-build-metadata:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.daily-package-version.outputs.version }}
      dotnet-major: ${{ steps.preview-version.outputs.major }}
      upstream-main-sha: ${{ steps.upstream.outputs.sha }}
    steps:
      # setup environment
      # > source
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # > node (latest)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: latest
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      # Resolve the latest preview package version so restore/pack still uses a valid NuGet version
      # while the upstream source itself is built from main.
      - name: Resolve latest preview package version
        id: preview-version
        run: node src/build/resolve-version.mjs
        env:
          BUILD_CHANNEL: preview
          GITHUB_TOKEN: ${{ github.token }}
      - name: Resolve daily package version
        id: daily-package-version
        run: |
          VERSION="0.$(date -u +'%Y.%m%d')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      # Record the upstream main commit used for this daily build.
      - name: Resolve upstream main commit
        id: upstream
        run: |
          SHA=$(git ls-remote https://github.com/dotnet/aspnetcore.git refs/heads/main | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

  # Build the upstream-main package variants to detect layout/build regressions early
  build:
    needs: [resolve-build-metadata]
    strategy:
      fail-fast: false
      matrix:
        profile: [es5, es2015]
    uses: ./.github/workflows/ci-profile-build.yml
    with:
      channel: preview
      profile: ${{ matrix.profile }}
      package-version: ${{ needs.resolve-build-metadata.outputs.package-version }}
      dotnet-major: ${{ needs.resolve-build-metadata.outputs.dotnet-major }}
      upstream-ref: main
      disable-terser: true
      signalr-logging: Trace

  # Run smoke tests against the built main package using the latest preview NuGet line
  smoke-test:
    needs: [resolve-build-metadata, build]
    strategy:
      fail-fast: false
      matrix:
        profile: [es5, es2015]
    uses: ./.github/workflows/ci-profile-test.yml
    with:
      channel: preview
      profile: ${{ matrix.profile }}
      package-version: ${{ needs.resolve-build-metadata.outputs.package-version }}
      dotnet-major: ${{ needs.resolve-build-metadata.outputs.dotnet-major }}

  # Update the README build status table with the latest daily run results.
  update-readme:
    needs: [smoke-test]
    if: ${{ always() && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: latest
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      - name: Update README build status
        run: node util/update-readme-status.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Commit and push README changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "docs: update build status tables [daily]"
          file_pattern: "README.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
