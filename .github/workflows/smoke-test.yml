name: Smoke test generated scripts

on:
  push:
    branches:
      - main
    files:
      - 'config/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci-profile-build.yml'
      - '.github/workflows/smoke-test.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-builds:
    runs-on: ubuntu-latest
    outputs:
      lts-package-version: ${{ steps.lts-version.outputs.version }}
      lts-package-major: ${{ steps.lts-version.outputs.major }}
      lts-tag: ${{ steps.lts-version.outputs.tag }}
      preview-package-version: ${{ steps.preview-version.outputs.version }}
      preview-package-major: ${{ steps.preview-version.outputs.major }}
      preview-tag: ${{ steps.preview-version.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      
      - name: Resolve latest LTS package version
        id: lts-version
        run: node scripts/build/resolve-version.mjs
        env:
          BUILD_CHANNEL: lts
          GITHUB_TOKEN: ${{ github.token }}

      - name: Resolve latest preview package version
        id: preview-version
        run: node scripts/build/resolve-version.mjs
        env:
          BUILD_CHANNEL: preview
          GITHUB_TOKEN: ${{ github.token }}

  smoke-tests:
    needs: [resolve-builds]
    strategy:
      fail-fast: false
      matrix:
        channel: [lts, preview]
        profile: [es5, es2015]
    uses: ./.github/workflows/ci-profile-build.yml
    with:
      channel: ${{ matrix.channel }}
      profile: ${{ matrix.profile }}
      package-version: ${{ matrix.channel == 'lts' && needs.resolve-builds.outputs.lts-package-version || needs.resolve-builds.outputs.preview-package-version }}
      run-compat: true
      disable-terser: true
      signalr-logging: Trace
