name: Build and compatibility test generated scripts

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - id: dotnet-versions
        shell: bash
        run: |
          {
            echo 'versions<<EOF'
            echo '8.0.x'
            node scripts/list-build-output.mjs majors | awk '{ print $1 ".0.x" }'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.dotnet-versions.outputs.versions }}
      - run: npm ci --ignore-scripts
      - env: { GITHUB_TOKEN: "${{ github.token }}" }
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages/*.nupkg

  compatibility-test:
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/download-artifact@v4
        with: { name: packages, path: artifacts/packages }
      - run: npm ci --ignore-scripts
      - run: npm run test:compat:update-readme
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-results
          path: |
            artifacts/compatibility/results.json
            README.md
