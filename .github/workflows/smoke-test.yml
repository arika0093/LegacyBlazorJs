name: Smoke test generated scripts

on:
  push:
    branches:
      - main
    files:
      - 'config/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci-profile-build.yml'
      - '.github/workflows/smoke-test.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-build:
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.lts-version.outputs.version }}
    steps:
      # setup environment
      # > source
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # > node (latest)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      # Resolve a package version/TFM pair compatible with the LTS SDK
      - name: Resolve latest LTS package version
        id: lts-version
        run: node scripts/build/resolve-version.mjs
        env:
          BUILD_CHANNEL: lts
          GITHUB_TOKEN: ${{ github.token }}

  smoke-test:
    needs: [resolve-build]
    strategy:
      fail-fast: false
      matrix:
        profile: [es5, es2015]
    uses: ./.github/workflows/ci-profile-build.yml
    with:
      channel: lts
      profile: ${{ matrix.profile }}
      package-version: ${{ needs.resolve-build.outputs.package-version }}
      run-compat: true
      disable-terser: true
      signalr-logging: Trace
