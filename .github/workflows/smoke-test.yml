name: Smoke test generated scripts

on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci-profile-build.yml'
      - '.github/workflows/ci-profile-test.yml'
      - '.github/workflows/smoke-test.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-builds:
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.builds.outputs.builds }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: latest
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      
      - name: Resolve configured package lines
        id: builds
        run: node src/build/resolve-builds.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build:
    needs: [resolve-builds]
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.resolve-builds.outputs.builds) }}
        profile: [es5, es2015]
    uses: ./.github/workflows/ci-profile-build.yml
    with:
      channel: ${{ matrix.build.channel }}
      profile: ${{ matrix.profile }}
      package-version: ${{ matrix.build.version }}
      disable-terser: true
      signalr-logging: Trace

  smoke-tests:
    needs: [resolve-builds, build]
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.resolve-builds.outputs.builds) }}
        profile: [es5, es2015]
        hosting: [Server]
    uses: ./.github/workflows/ci-profile-test.yml
    with:
      channel: ${{ matrix.build.channel }}
      profile: ${{ matrix.profile }}
      package-version: ${{ matrix.build.version }}
      hosting-model: ${{ matrix.hosting }}
