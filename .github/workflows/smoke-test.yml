name: Smoke test generated scripts

on:
  pull_request:
  workflow_dispatch:

env:
  BUILD_TARGET_PROFILES: es2015

permissions:
  contents: read

jobs:
  # build the latest ASP.NET Core source for .NET 10 and upload the NuGet package
  build-package:
    runs-on: ubuntu-latest
    steps:
      # setup environment
      # > source
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # > node (20)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      # > dotnet (10)
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      # fetch upstream source for .NET 10 and pack NuGet
      - name: Build upstream source and NuGet package
        run: npm run build -- 10
        env:
          # disable Terser for legacy Blazor JS builds to check source code
          LEGACY_BLAZOR_DISABLE_TERSER: true
          BUILD_TARGET_PROFILES: "${{ env.BUILD_TARGET_PROFILES }}"
          GITHUB_TOKEN: "${{ github.token }}"

      # upload packages
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages/*.nupkg

  # Run smoke tests against the es2015 variant using Blazor Server and WebAssembly
  smoke-test:
    needs: build-package
    strategy:
      fail-fast: false
      matrix:
        include:
          - { profile: es2015, hosting: Server }
    # Legacy Chromium often has shared library dependency issues on Linux, so run on Windows environment.
    runs-on: windows-latest
    steps:
      # > source
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # > node (20)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      # > dotnet (10)
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
      # download artifacts from build job
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages
      # > npm dependencies
      - run: npm ci --ignore-scripts
      # > browser setup downloads the target profile's Chromium directly
      - name: Select old Chromium for smoke test
        run: node scripts/test/export-browser-env.mjs ${{ matrix.profile }}
      # execute a smoke test for the specified variant
      - name: Run smoke test (${{ matrix.profile }}, Blazor ${{ matrix.hosting }})
        run: node --test tests/PlaywrightTest/smoke.test.mjs
        env:
          SMOKE_TEST_PROFILE: ${{ matrix.profile }}
          SMOKE_TEST_HOSTING_MODEL: ${{ matrix.hosting }}
