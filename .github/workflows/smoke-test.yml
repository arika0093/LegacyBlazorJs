name: Smoke test generated scripts

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # build the latest ASP.NET Core source for .NET 10 and upload the NuGet package
  build-package:
    runs-on: ubuntu-latest
    steps:
      # setup environment
      # > source
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # > node (20)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      # > dotnet (10)
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .work/aspnetcore-*
          key: smoke-build-${{ runner.os }}-upstream-${{ hashFiles('scripts/build/build-all.mjs', 'scripts/build/build-variants.mjs', 'scripts/build/build-upstream.mjs', 'scripts/build/lib/*.mjs', 'scripts/build/patches/*.mjs', 'config/targets.json') }}
          restore-keys: |
            smoke-build-${{ runner.os }}-upstream-
      # > npm dependencies
      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      # fetch upstream source for .NET 10 and pack NuGet
      - name: Build upstream source and NuGet package
        run: npm run build -- 10
        env:
          # disable Terser for legacy Blazor JS builds to check source code
          LEGACY_BLAZOR_DISABLE_TERSER: true
          BUILD_TARGET_PROFILES: es5
          GITHUB_TOKEN: "${{ github.token }}"

      # upload packages
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages/*.nupkg

  # Run a single smoke test against the ES5 variant using Blazor Server
  smoke-test:
    needs: build-package
    runs-on: ubuntu-latest
    steps:
      # > source
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # > node (20)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      # > dotnet (10)
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
      # download artifacts from build job
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages
      # > npm dependencies
      - run: npm ci --ignore-scripts
      # > install Linux browser dependencies; browser setup downloads the ES5-era Chromium below
      - run: dotnet tool install --global Microsoft.Playwright.CLI
      - run: playwright install-deps chromium
      - name: Select old Chromium for smoke test
        run: node scripts/test/export-browser-env.mjs es5
      # execute a single smoke test for the ES5 variant on Blazor Server
      - name: Run smoke test (ES5, Blazor Server)
        run: xvfb-run -a node --test tests/PlaywrightTest/smoke.test.mjs
        env:
          SMOKE_TEST_PROFILE: es5
          SMOKE_TEST_HOSTING_MODEL: Server
