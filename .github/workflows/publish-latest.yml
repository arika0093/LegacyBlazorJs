name: Build and publish latest ASP.NET Core tags to NuGet

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish missing package versions to NuGet.org
        type: boolean
        default: false
  schedule:
    - cron: '23 5 * * 1'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - id: dotnet-versions
        shell: bash
        run: |
          {
            echo 'versions<<EOF'
            {
              echo '8.0.x'
              node scripts/list-build-output.mjs majors | awk '{ print $1 ".0.x" }'
            } | sort -u
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.dotnet-versions.outputs.versions }}
      - run: npm ci --ignore-scripts
      - name: Build upstream source, browser variants, and NuGet package
        env: { GITHUB_TOKEN: "${{ github.token }}" }
        run: npm run build
      - name: Run ES20x compatibility matrix and refresh README snapshot
        run: npm run test:compat:update-readme
      - uses: actions/upload-artifact@v4
        with:
          name: LegacyBlazorJs-packages
          path: artifacts/packages/*.nupkg
      - uses: actions/upload-artifact@v4
        with:
          name: LegacyBlazorJs-compatibility-results
          path: |
            artifacts/compatibility/results.json
            README.md
      - name: Publish missing package
        if: github.event_name == 'schedule' || inputs.publish
        run: dotnet nuget push 'artifacts/packages/*.nupkg' --api-key '${{ secrets.NUGET_API_KEY }}' --source https://api.nuget.org/v3/index.json --skip-duplicate
