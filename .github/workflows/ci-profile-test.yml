name: CI profile test

on:
  workflow_call:
    inputs:
      # The build channel to test against, e.g. "current" or "preview"
      channel:
        required: true
        type: string
      # The profile to test, e.g. "es5" or "es2015"
      profile:
        required: true
        type: string
      # Optional suffix for the downloaded build artifact name.
      artifact-suffix:
        required: false
        type: string
        default: ''
      # The package version to test against, e.g. "7.0.0-preview.5"
      package-version:
        required: true
        type: string
      # The Blazor hosting model to execute, e.g. "Server" or "WebAssembly"
      hosting-model:
        required: false
        type: string
        default: 'Server'

permissions:
  contents: read

jobs:
  test-compat:
    timeout-minutes: 20
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
          cache: npm
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: latest
          dotnet-quality: preview

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LegacyBlazorJs-build-${{ inputs.channel }}-${{ inputs.artifact-suffix != '' && inputs.artifact-suffix || inputs.profile }}
          path: .

      - run: npm ci --ignore-scripts
      - name: Select old Chromium for smoke test
        run: node src/run/export-browser-env.mjs ${{ inputs.profile }}
      - name: Run smoke test (${{ inputs.channel }}, ${{ inputs.profile }}, Blazor ${{ inputs.hosting-model }})
        run: >
          node src/run/run-with-retry.mjs --timeout-minutes 5 --max-attempts 3 --retry-on timeout --
          node --test tests/ChromeSmokeTest/smoke.test.mjs
        env:
          PACKAGE_VERSION: ${{ inputs.package-version }}
          SMOKE_TEST_PROFILE: ${{ inputs.profile }}
          SMOKE_TEST_HOSTING_MODEL: ${{ inputs.hosting-model }}
